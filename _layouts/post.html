---
layout: default
---

<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      <span class="post-date">{{ page.date | date: "%Y年%m月%d日" }}</span>
      <span class="post-author">作者：{{ page.author | default: site.author.name }}</span>
      <span class="post-category">分类：<a href="{{ "/categories/" | relative_url }}#{{ page.category | slugify }}">{{ page.category }}</a></span>
    </div>
    {% if page.tags %}
    <div class="post-tags">
      标签：
      {% for tag in page.tags %}
      <span class="tag">{{ tag }}</span>
      {% endfor %}
    </div>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
